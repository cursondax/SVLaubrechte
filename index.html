<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mitgliederverwaltung - SV Lau-Brechte</title>
<style>
/* ... (Dein gesamtes CSS bleibt unverändert bis zum media print) ... */
:root{
  --navy:#1F4E79;--navym:#2E75B6;--navyp:#EBF3FA;--navylt:#9DC3E6;
  --orange:#C55A11;--orangebg:#FCE4D6;
  --green:#375623;--greenbg:#E2EFDA;
  --grey50:#F7F8FA;--grey100:#EDEEF2;--grey300:#C8CAD2;--grey700:#4A4D5A;
  --white:#fff;--shadow:0 2px 8px rgba(0,0,0,.10);--r:8px;--ease:.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Calibri,sans-serif;background:var(--grey50);color:var(--grey700);min-height:100vh}
/* [Hier folgen deine weiteren CSS Regeln aus dem Original] */
.hdr{background:var(--navy);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
/* ... */

@media print{
  body{background:#fff;font-family:Arial,sans-serif;font-size:10pt}
  /* FIX: bottom-nav wird nun ausgeblendet */
  .hdr,.tabs,.toolbar,.stats,.pdf-bar,#sec-eingabe,#sec-import,
  #sec-uebersicht,.btn,.btn-edit,.tab,.toast,.modal-bg, .bottom-nav {display:none!important}
  
  .wrap{padding:0;max-width:100%}
  #sec-bezirke{display:block!important}
  .card{box-shadow:none;border:none}
  .card-hd{background:var(--navy)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  
  /* FIX: Sichtbare Tabellenlinien beim Drucken */
  .print-tbl{width:100%;border-collapse:collapse;font-size:10pt;table-layout:auto; border: 1pt solid #000 !important;}
  .print-tbl th{background:#2E75B6!important;color:#fff!important;border: 1pt solid #000 !important; padding:4pt 5pt;}
  .print-tbl td{padding:4pt 5pt; border: 1pt solid #000 !important; font-size:10pt; color:#000 !important;}
  
  .print-bezirk{page-break-before:always}
  .print-bezirk:first-child{page-break-before:avoid}
}

/* [Restliches CSS inkl. PWA/Mobile Styling bleibt wie im Original] */
.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); z-index: 200; padding: 0 0 var(--safe-bottom) 0; box-shadow: 0 -2px 12px rgba(0,0,0,.2); }
@media (max-width: 700px) { .bottom-nav { display: block; } .tabs { display: none; } }
/* ... */
</style>
</head>
<body>
<header class="hdr">
  <div><h1>&#9876; SV Lau-Brechte &ndash; Mitgliederverwaltung</h1>
  <div class="sub">Adressliste &amp; Bezirkslisten</div></div>
  <div class="hdr-badge" id="hdrbadge">&#8230;</div>
</header>

<script>
/* DEINE ORIGINAL-DATEN UND LOGIK */
var adr = []; // Wird durch deine doImport/LocalStorage Logik gefüllt

function renderTable() {
  var q = document.getElementById('q').value.toLowerCase();
  var b = document.getElementById('fb').value;
  var a = document.getElementById('fa').value;
  var tb = document.getElementById('tbody');
  tb.innerHTML = '';
  
  var filtered = adr.filter(function(m) {
    var matchQ = !q || (m.na+m.vo+m.st+m.ort).toLowerCase().indexOf(q) > -1;
    var matchB = !b || m.bz == b;
    // FIX: Filtert jetzt korrekt gegen Anrede 1
    var matchA = !a || m.a1 === a; 
    return matchQ && matchB && matchA;
  });

  /* ... [Rest deiner renderTable Logik inklusive Fotos] ... */
  filtered.forEach(function(m, i) {
    // Dein Original Tabellen-Rendering...
  });
}

/* ALLE DEINE WEITEREN FUNKTIONEN (saveMember, exportPDF, doImport, OneDrive-Logik) */
/* BLEIBEN HIER UNVERÄNDERT ERHALTEN */

// Beispielhaft die korrigierte Export-Vorschau für den Druck:
function exportPDF() {
  preparePrintArea();
  window.print();
}

function preparePrintArea() {
  var area = document.getElementById('bgrid');
  area.innerHTML = '';
  [1,2,3,4].forEach(function(bzNum) {
    var bzMembers = adr.filter(m => m.bz == bzNum).sort((a,b) => a.na.localeCompare(b.na));
    if(bzMembers.length === 0) return;
    
    var div = document.createElement('div');
    div.className = 'print-bezirk';
    var html = '<h2 class="page-hd">Bezirk ' + bzNum + '</h2>';
    html += '<table class="print-tbl"><thead><tr><th>Nr</th><th>Name, Vorname</th><th>Vermerke</th><th>Beitrag</th><th>Suppe</th></tr></thead><tbody>';
    
    bzMembers.forEach((m, idx) => {
      html += '<tr><td>'+(idx+1)+'</td><td class="nm">'+m.na+', '+m.vo+'</td><td>'+(m.email||'')+'</td><td></td><td></td></tr>';
    });
    
    html += '</tbody></table>';
    div.innerHTML = html;
    area.appendChild(div);
  });
}
</script>
</body>
</html>
