<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SV Lau-Brechte">
<meta name="theme-color" content="#1F4E79">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231F4E79'/><text y='.9em' font-size='70' x='50%' text-anchor='middle'>⚔</text></svg>">

<title>Mitgliederverwaltung - SV Lau-Brechte</title>
<style>
:root{
  --navy:#1F4E79;--navym:#2E75B6;--navyp:#EBF3FA;--navylt:#9DC3E6;
  --orange:#C55A11;--orangebg:#FCE4D6;
  --green:#375623;--greenbg:#E2EFDA;
  --grey50:#F7F8FA;--grey100:#EDEEF2;--grey300:#C8CAD2;--grey700:#4A4D5A;
  --white:#fff;--shadow:0 2px 8px rgba(0,0,0,.10);--r:8px;--ease:.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Calibri,sans-serif;background:var(--grey50);color:var(--grey700);min-height:100vh}

/* Header & Nav */
.hdr{background:var(--navy);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;box-shadow:var(--shadow);position:sticky;top:0;z-index:100}
.hdr h1{color:#fff;font-size:1.1rem;font-weight:700}
.hdr-badge{background:var(--navym);color:#fff;border-radius:20px;padding:3px 14px;font-size:.78rem;font-weight:700}
.wrap{max-width:1300px;margin:0 auto;padding:1.5rem 1.5rem 3rem}
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;background:var(--grey100);border-radius:var(--r);padding:4px;width:fit-content}
.tab{padding:.5rem 1.3rem;border:none;background:transparent;border-radius:6px;font-size:.88rem;font-weight:600;color:var(--grey700);cursor:pointer;transition:var(--ease)}
.tab.on{background:var(--navy);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}

/* Cards & Tables */
.card{background:#fff;border-radius:var(--r);box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid var(--grey100);margin-bottom:1rem}
.card-hd{background:var(--navy);color:#fff;padding:.7rem 1.2rem;border-radius:var(--r) var(--r) 0 0;font-size:.95rem;font-weight:700}
.card-bd{padding:1.2rem}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:var(--navy);color:#fff;padding:.6rem .8rem;text-align:left;position:sticky;top:0}
tbody td{padding:.5rem .8rem;border-bottom:1px solid var(--grey100)}
tbody tr:nth-child(even){background:var(--navyp)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.2rem;border:none;border-radius:6px;font-size:.9rem;font-weight:700;cursor:pointer;transition:var(--ease)}
.btn-save{background:var(--green);color:#fff}
.btn-navy{background:var(--navy);color:#fff}
.btn-pdf{background:var(--orange);color:#fff}

/* DRUCKVERSION - KORRIGIERTE LINIEN */
@media print{
  body{background:#fff;font-family:Arial,sans-serif;font-size:10pt}
  .hdr,.tabs,.toolbar,.stats,.pdf-bar,#sec-eingabe,#sec-import,#sec-uebersicht,.btn,.bottom-nav,.no-print{display:none!important}
  .wrap{padding:0;max-width:100%;margin:0}
  #sec-bezirke{display:block!important}
  .card{box-shadow:none;border:none}
  .print-bezirk{page-break-before:always; padding-top:10px}
  .print-bezirk:first-child{page-break-before:avoid}
  
  .print-tbl{width:100%;border-collapse:collapse;table-layout:fixed;border:1.5pt solid #000}
  .print-tbl th{
    background:#2E75B6!important;
    color:#fff!important;
    border:1pt solid #000;
    padding:6pt 4pt;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  
  /* DEUTLICHE VERTIKALE LINIEN */
  .print-tbl td{
    padding:5pt 4pt;
    border-bottom: 0.5pt solid #333;
    border-right: 1.5pt solid #000 !important; /* Dicke schwarze Linie zwischen Spalten */
    word-wrap: break-word;
  }
  .print-tbl td:last-child{border-right:none !important}
  
  /* Spaltenbreiten */
  .td-nr{width:30pt; text-align:center}
  .td-name{width:160pt; font-weight:bold}
  .td-verm{width:auto}
  .td-beit{width:50pt; text-align:center}
  .td-suppe{width:50pt; text-align:center}

  h2 { color: #1F4E79; border-bottom: 2pt solid #1F4E79; margin-bottom: 10pt; padding-bottom: 5pt }
}

.sec{display:none}.sec.on{display:block}
.toolbar { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap }
.srch { flex:1; padding:10px; border-radius:6px; border:1px solid #ccc }
</style>
</head>
<body>

<header class="hdr">
  <h1>⚔ SV Lau-Brechte Admin</h1>
  <div class="hdr-badge" id="hdrbadge">0 Personen</div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" onclick="showTab('uebersicht',this)">📋 Übersicht</button>
    <button class="tab" onclick="showTab('bezirke',this)">📂 Bezirke</button>
    <button class="tab" onclick="showTab('import',this)">⚙️ Daten & Import</button>
  </div>

  <div class="sec on" id="sec-uebersicht">
    <div class="card card-bd">
        <div class="toolbar">
            <input type="text" id="q" class="srch" placeholder="🔍 Suche nach Name, Ort oder Straße..." oninput="renderTable()">
            <select id="fa" class="btn" style="background:#fff; border:1px solid #ccc; font-family:inherit" onchange="renderTable()">
                <option value="">Alle Anreden (Filter)</option>
                <option value="Familie">Familie</option>
                <option value="Frau">Frau</option>
                <option value="Schützenbruder">Schützenbruder</option>
            </select>
        </div>
        <div class="tbl-wrap">
            <table>
                <thead>
                    <tr><th>Bz.</th><th>Anrede</th><th>Name</th><th>Vorname</th><th>Straße</th><th>Ort</th></tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>
  </div>

  <div class="sec" id="sec-bezirke">
    <div class="card card-bd no-print">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <div>
                <h3>Bezirkslisten Druckansicht</h3>
                <p>Spalten sind durch dicke Linien getrennt.</p>
            </div>
            <button class="btn btn-pdf" onclick="window.print()">🖨️ Liste Drucken / PDF</button>
        </div>
    </div>
    <div id="print-area"></div>
  </div>

  <div class="sec" id="sec-import">
    <div class="card card-bd">
        <h3>Datenverwaltung</h3>
        <p>Hier können CSV-Daten importiert werden.</p>
        <input type="file" id="csvFile" accept=".csv" style="margin-top:10px">
        <button class="btn btn-navy" onclick="handleImport()" style="margin-top:10px">📥 Importieren</button>
        <button class="btn btn-save" onclick="localStorage.removeItem('sv_data'); location.reload()" style="margin-top:10px; background:#c0392b">🗑️ Alle Daten löschen</button>
    </div>
  </div>
</div>

<script>
// Daten laden
let mitglieder = JSON.parse(localStorage.getItem('sv_data') || '[]');

function showTab(id, btn) {
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    document.getElementById('sec-' + id).classList.add('on');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    btn.classList.add('on');
    if(id === 'bezirke') preparePrint();
}

// Filter korrigiert: Prüft nun exakt die Anrede
function renderTable() {
    const tbody = document.getElementById('tbody');
    const q = document.getElementById('q').value.toLowerCase();
    const filterAnrede = document.getElementById('fa').value;
    
    tbody.innerHTML = '';
    
    const gefiltert = mitglieder.filter(m => {
        const matchSearch = (m.nachname + m.vorname + m.strasse + (m.ort||'')).toLowerCase().includes(q);
        // Exakter Vergleich für den Anrede-Filter
        const matchAnrede = filterAnrede === "" || m.anrede === filterAnrede;
        return matchSearch && matchAnrede;
    });

    gefiltert.forEach(m => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${m.bezirk}</td><td>${m.anrede}</td><td>${m.nachname}</td><td>${m.vorname}</td><td>${m.strasse}</td><td>${m.ort || ''}</td>`;
        tbody.appendChild(tr);
    });
    document.getElementById('hdrbadge').innerText = gefiltert.length + ' Personen';
}

function preparePrint() {
    const area = document.getElementById('print-area');
    area.innerHTML = '';
    
    const bezirke = [...new Set(mitglieder.map(m => m.bezirk))].sort();
    
    bezirke.forEach(bz => {
        if(!bz) return;
        const div = document.createElement('div');
        div.className = 'print-bezirk';
        
        let html = `<h2>Bezirk ${bz}</h2>`;
        html += `<table class="print-tbl">
            <thead>
                <tr>
                    <th class="td-nr">Nr</th>
                    <th class="td-name">Name, Vorname</th>
                    <th class="td-verm">Vermerke / E-Mail</th>
                    <th class="td-beit">Beitrag</th>
                    <th class="td-suppe">Suppe</th>
                </tr>
            </thead>
            <tbody>`;
        
        const bzMitglieder = mitglieder.filter(m => m.bezirk == bz)
            .sort((a,b) => a.nachname.localeCompare(b.nachname));

        bzMitglieder.forEach((m, idx) => {
            html += `<tr>
                <td class="td-nr">${idx+1}</td>
                <td class="td-name">${m.nachname}, ${m.vorname}</td>
                <td class="td-verm">${m.email || ''} ${m.handy ? '/ '+m.handy : ''}</td>
                <td class="td-beit"></td>
                <td class="td-suppe"></td>
            </tr>`;
        });
        
        html += `</tbody></table>`;
        div.innerHTML = html;
        area.appendChild(div);
    });
}

function handleImport() {
    const file = document.getElementById('csvFile').files[0];
    if(!file) return alert("Bitte Datei wählen");
    
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        const lines = text.split('\n');
        const data = [];
        // Einfacher Parser (Annahme: Semikolon Trennung)
        for(let i=1; i<lines.length; i++) {
            const cols = lines[i].split(';');
            if(cols.length > 3) {
                data.push({
                    id: Date.now() + i,
                    bezirk: cols[0],
                    anrede: cols[1],
                    nachname: cols[2],
                    vorname: cols[3],
                    strasse: cols[4],
                    ort: cols[5],
                    email: cols[6]
                });
            }
        }
        mitglieder = data;
        localStorage.setItem('sv_data', JSON.stringify(mitglieder));
        alert(data.length + " Mitglieder geladen");
        renderTable();
    };
    reader.readAsText(file);
}

// Start
renderTable();
</script>
</body>
</html>
